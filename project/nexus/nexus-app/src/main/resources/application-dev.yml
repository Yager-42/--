# 开发环境占位配置
logging:
  level:
    cn.nexus: DEBUG

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/nexus_social?useSSL=false&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest
  kafka:
    bootstrap-servers: 127.0.0.1:9092
    consumer:
      group-id: nexus-like-pipeline
      auto-offset-reset: earliest
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY:}
  sql:
    init:
      mode: never

hotkey:
  appName: nexus
  etcdServer: http://127.0.0.1:2379
  pushPeriodMs: 500

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

feed:
  inbox:
    maxSize: 1000
    ttlDays: 30
  outbox:
    maxSize: 1000
    ttlDays: 30
  corefans:
    ttlDays: 30
  fanout:
    batchSize: 200
  rebuild:
    perFollowingLimit: 20
    inboxSize: 200
    maxFollowings: 2000
    lockSeconds: 30
  follow:
    compensate:
      recentPosts: 20
  bigv:
    followerThreshold: 500000
    coreFanMaxPush: 2000
    pull:
      maxBigvFollowings: 200
      perBigvLimit: 50
    pool:
      enabled: false
      buckets: 4
      maxSizePerBucket: 500000
      ttlDays: 7
      fetchFactor: 30
      triggerFollowings: 200
  recommend:
    # Gorse Base URL；为空表示不启用 gorse（读侧自动降级到 global latest）。
    baseUrl: http://127.0.0.1:8087
    connectTimeoutMs: 200
    readTimeoutMs: 500
    sessionTtlMinutes: 20
    prefetchFactor: 5
    scanFactor: 10
    maxAppendRounds: 3
    backfill:
      enabled: false
      pageSize: 500
  global:
    latest:
      maxSize: 20000

risk:
  llm:
    text-model: ${RISK_LLM_TEXT_MODEL:qwen-plus}
    image-model: ${RISK_LLM_IMAGE_MODEL:qwen-vl-plus}
    budgetPerMinute: 200
    cacheTtlSeconds: 86400
    inflightLockSeconds: 30
  autoPunish:
    enabled: false
    minConfidence: 0.95
    durationSeconds: 600
  sample:
    # PASS 抽检比例（0-100）；默认 0 表示关闭
    passPercent: 0
    # 工作时段（Asia/Shanghai）：仅时段内生效；end<=start 视为不限制
    workStartHour: 9
    workEndHour: 21
    salt: ${RISK_SAMPLE_SALT:}

# Search & Discovery（ES + MQ + Redis）
search:
  es:
    endpoints: http://127.0.0.1:9200
    indexAlias: social_search
  mq:
    concurrency: 2
    prefetch: 20
    retry:
      maxAttempts: 5
      initialIntervalMs: 1000
      multiplier: 3.0
      maxIntervalMs: 60000
  result:
    defaultLimit: 20
    maxLimit: 50
  backfill:
    enabled: false
    pageSize: 500
    checkpoint:
      enabled: true
      redisKey: search:backfill:cursor
  history:
    maxSize: 20
    ttlDays: 90
  trending:
    windowDays: 7
    dailyTtlDays: 8
    unionTtlSeconds: 120
    topKForSuggestScan: 200
