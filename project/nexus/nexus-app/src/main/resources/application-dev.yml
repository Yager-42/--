# 开发环境占位配置
logging:
  level:
    cn.nexus: INFO

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/nexus_social?useSSL=false&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 5000
  cassandra:
    keyspace-name: nexus_kv
    contact-points: 127.0.0.1
    port: 9042
    local-datacenter: datacenter1
    schema-action: NONE
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY:}
  sql:
    init:
      mode: never

server:
  tomcat:
    threads:
      max: 300
      min-spare: 50
    accept-count: 1000
    max-connections: 8192
    connection-timeout: 20s

hotkey:
  appName: nexus
  etcdServer: http://127.0.0.1:2379
  pushPeriodMs: 500

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

social:
  cache:
    hot-ttl:
      content-post-seconds: 300
      reaction-count-seconds: 0
      feed-card-seconds: 7200

feed:
  inbox:
    maxSize: 1000
    ttlDays: 14
  outbox:
    maxSize: 1000
    ttlDays: 14
  corefans:
    ttlDays: 30
  fanout:
    batchSize: 200
  rebuild:
    perFollowingLimit: 20
    inboxSize: 200
    maxFollowings: 2000
    lockSeconds: 30
  follow:
    compensate:
      recentPosts: 20
  bigv:
    followerThreshold: 500000
    coreFanMaxPush: 2000
    pull:
      maxBigvFollowings: 200
      perBigvLimit: 50
    pool:
      enabled: false
      buckets: 4
      maxSizePerBucket: 500000
      ttlDays: 7
      fetchFactor: 30
      triggerFollowings: 200
  recommend:
    # Gorse Base URL；为空表示不启用 gorse（读侧自动降级到 global latest）。
    baseUrl: http://127.0.0.1:8087
    connectTimeoutMs: 200
    readTimeoutMs: 500
    sessionTtlMinutes: 20
    prefetchFactor: 5
    scanFactor: 10
    maxAppendRounds: 3
    backfill:
      enabled: false
      pageSize: 500
  global:
    latest:
      maxSize: 20000

risk:
  llm:
    text-model: ${RISK_LLM_TEXT_MODEL:qwen-plus}
    image-model: ${RISK_LLM_IMAGE_MODEL:qwen-vl-plus}
    budgetPerMinute: 200
    cacheTtlSeconds: 86400
    inflightLockSeconds: 30
  autoPunish:
    enabled: false
    minConfidence: 0.95
    durationSeconds: 600
  sample:
    # PASS 抽检比例（0-100）；默认 0 表示关闭
    passPercent: 0
    # 工作时段（Asia/Shanghai）：仅时段内生效；end<=start 视为不限制
    workStartHour: 9
    workEndHour: 21
    salt: ${RISK_SAMPLE_SALT:}

# Search & Discovery（ES + MQ + Redis）
search:
  index:
    cdc:
      raw:
        queue: ${SEARCH_INDEX_CDC_RAW_QUEUE:search.cdc.raw.queue}
      publish:
        exchange: ${SEARCH_INDEX_CDC_PUBLISH_EXCHANGE:search.cdc.exchange}
        routingKey: ${SEARCH_INDEX_CDC_PUBLISH_ROUTING_KEY:post.changed}
      filter:
        schema: ${SEARCH_INDEX_CDC_FILTER_SCHEMA:nexus_social}
        tables: ${SEARCH_INDEX_CDC_FILTER_TABLES:content_post,content_post_type}
  es:
    endpoints: http://127.0.0.1:9200
    indexAlias: zhiguang_content_index
  mq:
    concurrency: 2
    prefetch: 20
    retry:
      maxAttempts: 5
      initialIntervalMs: 1000
      multiplier: 3.0
      maxIntervalMs: 60000
  backfill:
    enabled: true
    pageSize: 500
    checkpoint:
      enabled: true
      redisKey: search:backfill:cursor


storage:
  type: minio

minio:
  media:
    endpoint: http://127.0.0.1:9000
    accessKey: minioadmin
    secretKey: minioadmin
    bucket: nexus
    basePath: content
    expirySeconds: 900

aliyun:
  oss:
    media:
      endpoint: oss-cn-shanghai.aliyuncs.com
      accessKey: ${ALIYUN_OSS_ACCESS_KEY:}
      secretKey: ${ALIYUN_OSS_SECRET_KEY:}
      bucket: ${ALIYUN_OSS_BUCKET:}
      basePath: content
      expirySeconds: 900

# Leaf（segment + snowflake）
leaf:
  name: nexus
  snowflake:
    enabled: true
    zk-address: 127.0.0.1:2181
    port: 2222

# Sa-Token（用于 Authorization: Bearer token）
sa-token:
  token-name: Authorization
  token-prefix: Bearer
  is-log: false

auth:
  admin:
    bootstrap-phones: []
  sms:
    phone-send-limit-1m: 1
    phone-send-limit-1h: 5
    phone-send-limit-1d: 10
    ip-send-limit-1m: 5
    ip-send-limit-1d: 50
  login:
    fail-threshold: 5
    lock-seconds: 900

# Like/Unlike MQ consumers (batch ~= BufferTrigger 1000/1s)
mq:
  like-unlike:
    consumer:
      concurrency: 1
      prefetch: 1000
      batch-size: 1000
      receive-timeout-ms: 1000
      retry:
        max-attempts: 5
        initial-interval-ms: 200
        multiplier: 2.0
        max-interval-ms: 5000

mq-consumer:
  like-unlike:
    rate-limit: 200
