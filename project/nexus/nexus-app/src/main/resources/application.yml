spring:
  application:
    name: nexus
  profiles:
    active: dev
    group:
      wsl:
        - dev

server:
  port: 8080

logging:
  level:
    root: INFO

social:
  cache:
    hot-ttl:
      content-post-seconds: 300
      reaction-count-seconds: 0
      feed-card-seconds: 7200

search:
  index:
    cdc:
      raw:
        queue: ${SEARCH_INDEX_CDC_RAW_QUEUE:search.cdc.raw.queue}
